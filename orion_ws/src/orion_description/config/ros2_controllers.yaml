controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # mecanum_drive_controller replaced by custom C++ node (mecanum_drive_node).
    # The node subscribes to /cmd_vel and publishes Float64MultiArray to
    # /wheel_velocity_commands, which is consumed by this forward_command_controller.
    wheel_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    arm_effort_controller:
      type: forward_command_controller/ForwardCommandController

# wheel_velocity_controller: receives [fl, fr, rl, rr] rad/s from mecanum_drive_node
wheel_velocity_controller:
  ros__parameters:
    joints:
      - front_left_wheel_joint
      - front_right_wheel_joint
      - rear_left_wheel_joint
      - rear_right_wheel_joint
    interface_name: velocity

arm_controller:
  ros__parameters:

    joints:
      - shoulder_joint
      - elbow_joint
      - wrist_joint
      - wrist_roll_joint

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0  
    allow_partial_joints_goal: false  
    allow_integration_in_goal_trajectories: false  

    gains:
      shoulder_joint:
        p: 20.0
        i:  0.0
        d: 5.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0
      elbow_joint:
        p: 20.0
        i:  0.0
        d: 5.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0
      wrist_joint:
        p: 15.0
        i:  0.0
        d: 4.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0
      wrist_roll_joint:
        p: 10.0
        i:  0.0
        d: 3.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0


    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
      shoulder_joint:
        trajectory: 0.0
        goal: 0.1
      elbow_joint:
        trajectory: 0.0
        goal: 0.1
      wrist_joint:
        trajectory: 0.0
        goal: 0.1
      wrist_roll_joint:
        trajectory: 0.0
        goal: 0.1

gripper_controller:
  ros__parameters:

    joints:
      - gripper_left_joint       
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: false

    gains:
      gripper_left_joint:
        p:  50.0
        i:   0.001
        d:   5.0
        i_clamp_max:  2.0
        i_clamp_min: -2.0

    constraints:
      stopped_velocity_tolerance: 0.005   
      goal_time: 0.0
      gripper_left_joint:
        trajectory: 0.005  
        goal:       0.001   

arm_effort_controller:
  ros__parameters:
    joints:
      - shoulder_joint
      - elbow_joint
      - wrist_joint
      - wrist_roll_joint
    interface_name: effort
