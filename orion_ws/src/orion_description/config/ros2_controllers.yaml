controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_controller:
      type: mecanum_drive_controller/MecanumDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

mecanum_controller:
  ros__parameters:
    front_left_wheel_name: "front_left_wheel_joint"
    front_right_wheel_name: "front_right_wheel_joint"
    rear_left_wheel_name: "rear_left_wheel_joint"
    rear_right_wheel_name: "rear_right_wheel_joint"

    wheel_seperation_x: 0.19
    wheel_seperation_y: 0.26
    wheel_radius: 0.05

    base_frame_id: base_link
    odom_fram_id: odom
    enable_odom_tf: true
    use_stamped_vel: false

arm_controller:
  ros__parameters:
    joints:
      - shoulder_joint
      - elbow_joint
      - wrist_joint
      - wrist_roll_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

gripper_controller:
  ros__parameters:
    joints:
      - gripper_left_joint
      - gripper_right_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true