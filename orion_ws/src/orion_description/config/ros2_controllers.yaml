controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_controller:
      type: mecanum_drive_controller/MecanumDriveController

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    arm_effort_controller:
      type: forward_command_controller/ForwardCommandController

mecanum_controller:
  ros__parameters:

    front_left_wheel_command_joint_name:  "front_left_wheel_joint"
    front_right_wheel_command_joint_name: "front_right_wheel_joint"
    rear_right_wheel_command_joint_name:  "rear_right_wheel_joint"
    rear_left_wheel_command_joint_name:   "rear_left_wheel_joint"

    # These must match the command_interface type declared in the ros2_control
    # block in the URDF — wheels use velocity interfaces.
    command_interface_name: velocity
    reference_timeout: 0.0

    kinematics:
      wheels_radius: 0.050
      sum_of_robot_center_projection_on_X_Y_axis: 0.225

    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

    # Use non-stamped Twist so standard teleop tools work without a header.
    # The launch file already publishes TwistStamped; set true if you want to
    # keep using TwistStamped, false for plain Twist (teleop_twist_keyboard).
    use_stamped_vel: true

    pose_covariance_diagonal:     [0.001, 0.001, 0.001, 0.001, 0.001, 0.010]
    twist_covariance_diagonal:    [0.001, 0.001, 0.001, 0.001, 0.001, 0.010]

arm_controller:
  ros__parameters:

    joints:
      - shoulder_joint
      - elbow_joint
      - wrist_joint
      - wrist_roll_joint

    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0  
    allow_partial_joints_goal: false  
    allow_integration_in_goal_trajectories: false  

    gains:
      shoulder_joint:
        p: 20.0
        i:  0.0
        d: 5.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0
      elbow_joint:
        p: 20.0
        i:  0.0
        d: 5.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0
      wrist_joint:
        p: 15.0
        i:  0.0
        d: 4.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0
      wrist_roll_joint:
        p: 10.0
        i:  0.0
        d: 3.0
        i_clamp_max:  5.0
        i_clamp_min: -5.0


    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
      shoulder_joint:
        trajectory: 0.0
        goal: 0.1
      elbow_joint:
        trajectory: 0.0
        goal: 0.1
      wrist_joint:
        trajectory: 0.0
        goal: 0.1
      wrist_roll_joint:
        trajectory: 0.0
        goal: 0.1

gripper_controller:
  ros__parameters:

    joints:
      - gripper_left_joint       
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false
    allow_integration_in_goal_trajectories: false

    gains:
      gripper_left_joint:
        p:  50.0
        i:   0.001
        d:   5.0
        i_clamp_max:  2.0
        i_clamp_min: -2.0

    constraints:
      stopped_velocity_tolerance: 0.005   
      goal_time: 0.0
      gripper_left_joint:
        trajectory: 0.005  
        goal:       0.001   

arm_effort_controller:
  ros__parameters:
    joints:
      - shoulder_joint
      - elbow_joint
      - wrist_joint
      - wrist_roll_joint
    interface_name: effort
